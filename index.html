<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar - AI Financial Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .btn-primary {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }
        .stock-up {
            color: #10b981;
        }
        .stock-down {
            color: #ef4444;
        }
        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-white flex items-center justify-center p-4">
    <div class="glass-card p-8 w-full max-w-2xl">
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-robot text-4xl"></i>
            </div>
            <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-indigo-400 to-purple-300 text-transparent bg-clip-text">Oscar AI</h1>
            <p class="text-gray-300 text-lg">Your Personal Financial Assistant</p>
        </div>
        
        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-300 mb-2">Phone Number</label>
            <div class="flex">
                <input type="tel" id="phone" 
                       class="flex-1 bg-gray-800 text-white rounded-l-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="+91XXXXXXXXXX"
                       value="+91">
                <button id="callButton" 
                        class="btn-primary text-white px-6 py-3 rounded-r-lg font-medium flex items-center justify-center"
                        onclick="initiateCall()">
                    <i class="fas fa-phone-alt mr-2"></i> Call Me
                </button>
            </div>
        </div>

        <div class="mb-8">
            <label class="block text-sm font-medium text-gray-300 mb-3">Quick Actions</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <button class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-4 rounded-lg transition flex items-center"
                        onclick="initiateCall('market')">
                    <i class="fas fa-chart-line mr-2 text-blue-400"></i> Market Update
                </button>
                <button class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-4 rounded-lg transition flex items-center"
                        onclick="initiateCall('portfolio')">
                    <i class="fas fa-wallet mr-2 text-green-400"></i> Portfolio Review
                </button>
                <button class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-4 rounded-lg transition flex items-center"
                        onclick="initiateCall('tech')">
                    <i class="fas fa-microchip mr-2 text-purple-400"></i> Tech Stocks
                </button>
                <button class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-4 rounded-lg transition flex items-center"
                        onclick="initiateCall('dividend')">
                    <i class="fas fa-percentage mr-2 text-yellow-400"></i> Dividend Stocks
                </button>
            </div>
        </div>

        <div class="bg-gray-900 bg-opacity-50 rounded-lg p-4 mb-6">
            <h3 class="text-lg font-medium mb-3 flex items-center">
                <i class="fas fa-info-circle mr-2 text-blue-400"></i> Market Snapshot
                <span id="marketStatus" class="ml-2 text-xs px-2 py-1 rounded-full bg-blue-900 bg-opacity-50">Live</span>
            </h3>
            <div id="marketData" class="space-y-2 text-sm">
                <div class="flex justify-between">
                    <span>Loading market data...</span>
                    <div class="loading"></div>
                </div>
            </div>
        </div>

        <div id="status" class="text-center text-sm text-gray-400 mt-6">
            Ready to assist you with your financial needs
        </div>
    </div>

    <script>
        // Market data templates
        const MARKET_SYMBOLS = ['^GSPC', '^DJI', '^IXIC', '^N225', '^FTSE'];
        const MARKET_NAMES = {
            '^GSPC': 'S&P 500',
            '^DJI': 'Dow Jones',
            '^IXIC': 'NASDAQ',
            '^N225': 'Nikkei 225',
            '^FTSE': 'FTSE 100'
        };

        // Initialize market data
        async function initMarketData() {
            try {
                const response = await fetchMarketData();
                updateMarketDisplay(response);
                // Refresh every 5 minutes
                setInterval(fetchAndUpdateMarketData, 300000);
            } catch (error) {
                console.error('Error initializing market data:', error);
                document.getElementById('marketData').innerHTML = 
                    '<div class="text-red-400">Failed to load market data. Please try again later.</div>';
            }
        }

        // Fetch market data from Alpha Vantage
        async function fetchMarketData() {
            const symbols = MARKET_SYMBOLS.join(',');
            const response = await fetch(`https://www.alphavantage.co/query?function=BATCH_QUOTE_US&symbols=${symbols}&apikey=SGIS8J4UTW8UZZ2M`);
            const data = await response.json();
            return data['Stock Quotes'] || [];
        }

        // Update market data display
        function updateMarketDisplay(marketData) {
            const container = document.getElementById('marketData');
            if (!marketData || marketData.length === 0) {
                container.innerHTML = '<div class="text-yellow-400">Market data temporarily unavailable</div>';
                return;
            }

            container.innerHTML = marketData.map(stock => {
                const symbol = stock['1. symbol'];
                const price = parseFloat(stock['2. price']).toFixed(2);
                const change = parseFloat(stock['3. change']);
                const changePercent = parseFloat(stock['4. change percent'].replace('%', ''));
                
                const isPositive = change >= 0;
                const changeSign = isPositive ? '+' : '';
                const changeClass = isPositive ? 'stock-up' : 'stock-down';
                const changeIcon = isPositive ? '↑' : '↓';

                return `
                    <div class="flex justify-between items-center">
                        <span>${MARKET_NAMES[symbol] || symbol}</span>
                        <div class="text-right">
                            <div class="font-medium">${price}</div>
                            <div class="text-xs ${changeClass}">
                                ${changeSign}${change.toFixed(2)} (${changeSign}${Math.abs(changePercent).toFixed(2)}%)
                                ${changeIcon}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Fetch and update market data
        async function fetchAndUpdateMarketData() {
            try {
                const marketData = await fetchMarketData();
                updateMarketDisplay(marketData);
            } catch (error) {
                console.error('Error updating market data:', error);
            }
        }

        // Initialize market data when page loads
        document.addEventListener('DOMContentLoaded', initMarketData);

        // Call handling functions
        function updateStatus(message, isError = false) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = message;
            statusEl.className = `text-center text-sm mt-6 ${isError ? 'text-red-400' : 'text-gray-400'}`;
        }

        async function initiateCall(type = 'general') {
            const phoneNumber = document.getElementById('phone').value.trim();
            const callButton = document.getElementById('callButton');
            
            // Basic validation
            if (!phoneNumber) {
                updateStatus('Please enter a phone number', true);
                return;
            }

            // Disable button and show loading
            callButton.disabled = true;
            callButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Calling...';
            updateStatus('Initiating call, please wait...');

            try {
                // Call the GitHub Actions workflow
                const response = await fetch('https://api.github.com/repos/chhaavii/OSCARR/actions/workflows/call.yml/dispatches', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': 'token ' + 'YOUR_GITHUB_TOKEN', // Replace with your token
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        ref: 'gh-pages',
                        inputs: {
                            phone_number: phoneNumber,
                            call_type: type
                        }
                    })
                });

                if (response.ok) {
                    updateStatus(`Call initiated to ${phoneNumber}. You should receive a call shortly.`);
                } else {
                    const error = await response.json();
                    throw new Error(error.message || 'Failed to initiate call');
                }
                
            } catch (error) {
                console.error('Error:', error);
                updateStatus(`Error: ${error.message || 'Failed to initiate call. Please try again.'}`, true);
            } finally {
                // Re-enable the button after a short delay
                setTimeout(() => {
                    callButton.disabled = false;
                    callButton.innerHTML = '<i class="fas fa-phone-alt mr-2"></i> Call Me';
                }, 5000);
            }
        }
    </script>
</body>
</html>
