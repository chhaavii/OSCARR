name: Oscar AI Financial Call

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'Phone number to call (with country code)'
        required: true
        default: '+919911708120'
      call_type:
        description: 'Type of financial advice (market, portfolio, tech, etc.)'
        required: true
        default: 'market'

jobs:
  financial-call:
    runs-on: ubuntu-latest
    steps:
      - name: Make Financial Advisory Call
        env:
          BLAND_AI_KEY: ${{ secrets.BLAND_AI_KEY }}
        run: |
          # Map call types to personalized advice prompts
          case "${{ github.event.inputs.call_type }}" in
            market)
              advice_type="personalized market analysis and investment opportunities"
              ;;
            portfolio)
              advice_type="portfolio review and optimization suggestions"
              ;;
            tech)
              advice_type="technology sector insights and stock recommendations"
              ;;
            retirement)
              advice_type="retirement planning strategy"
              ;;
            investment)
              advice_type="investment strategy recommendations"
              ;;
            *)
              advice_type="personalized financial advice"
              ;;
          esac

          curl -X POST https://api.bland.ai/v1/calls \
            -H "Authorization: $BLAND_AI_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "phone_number": "${{ github.event.inputs.phone_number }}",
              "task": "Hello, this is Oscar, your personal financial advisor. I have your '$advice_type' ready. [Pause] Based on your financial profile and current market conditions, here are my insights:",
              "model": "enhanced",
              "wait_for_greeting": false,
              "record": false,
              "interruptions_enabled": false,
              "voice_settings": {
                "speed": 1.1,
                "stability": 0.8
              }
            }'
